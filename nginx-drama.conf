server {
    listen 80;
    server_name 43.159.62.11;
    client_max_body_size 500M;

    # Frontend static files
    root /var/www/drama/client;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend - optimized for uploads
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Upload optimization - larger buffers
        proxy_request_buffering off;
        proxy_buffering off;
        client_body_buffer_size 10M;
        client_body_timeout 600s;
    }

    # Admin panel - no cache
    location /admin {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
        add_header Pragma 'no-cache' always;
        add_header Expires '0' always;
    }

    # Uploads static files - video streaming optimization
    location /uploads {
        alias /var/www/drama/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Video streaming support
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
    }
}
